      <path stroke="url(#wave-a)" stroke-width="22" d="M-110 106 C 62 52 176 208 352 136 S 656 42 838 120 S 1112 228 1194 148"/>
      <path stroke="url(#wave-c)" stroke-width="14" d="M-90 186 C 88 136 228 270 416 210 S 692 94 902 180 S 1118 294 1200 214"/>
    </g>
    <g>
