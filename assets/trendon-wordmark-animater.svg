<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 360" role="img" aria-labelledby="title desc">
  <title id="title">trendon.monster</title>
  <desc id="desc">Анимированный логотип trendon.monster с плазменными волнами</desc>
  <defs>
    <linearGradient id="wordmark-bg" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#8de0cd"/>
      <stop offset="48%" stop-color="#7fb1ff"/>
      <stop offset="100%" stop-color="#f1bd72"/>
    </linearGradient>
    <linearGradient id="wave-a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8de0cd" stop-opacity="0"/>
      <stop offset="28%" stop-color="#8de0cd" stop-opacity="0.96"/>
      <stop offset="62%" stop-color="#7fb1ff" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#7fb1ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave-b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f29dc0" stop-opacity="0"/>
      <stop offset="36%" stop-color="#f1bd72" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#d4de7a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave-c" x1="0%" y1="0%" x2="100%" y2="0%">
