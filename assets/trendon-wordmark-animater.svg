    <g fill="none" stroke-linecap="round" filter="url(#plasma-soften)">
      <path stroke="url(#wave-a)" stroke-width="22" d="M-110 106 C 62 52 176 208 352 136 S 656 42 838 120 S 1112 228 1194 148">
