  <text x="520" y="190" fill="#f7f1e8" fill-opacity="0.94" font-size="132" font-weight="800" letter-spacing="-4" text-anchor="middle" dominant-baseline="middle" font-family="Barlow Condensed, Arial Narrow, sans-serif">trendon.monster</text>
