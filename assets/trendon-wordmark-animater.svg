  <rect x="8" y="8" width="1024" height="344" rx="34" fill="#0b0e16"/>
  <rect x="8" y="8" width="1024" height="344" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <g filter="url(#plasma-soften)" opacity="0.22">
    <circle cx="220" cy="132" r="118" fill="#7fb1ff">
